<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/yifu_style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="nav-logo">Yifu Guo</a>
            <div class="nav-menu">
                <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
                <a href="{{ '/blog/' | relative_url }}" class="nav-link">Blog</a>

                {% if page.multilang %}
                <div class="nav-lang-switcher active">
                    <div class="toggle-wrapper en-mode" id="lang-toggle-wrapper">
                        <div class="toggle-background"></div>
                        <div class="toggle-label" id="label-zh" onclick="switchLang('zh')">ZH</div>
                        <div class="toggle-label active" id="label-en" onclick="switchLang('en')">EN</div>
                    </div>
                </div>
                {% endif %}

                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main style="margin-top: 80px;">
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} Yifu Guo. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ '/yifu_script.js' | relative_url }}"></script>
</body>

</html>
